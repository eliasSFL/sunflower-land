# Corn Maze portal — builds the portal bundle and syncs it to the
# corn-maze.minigames.sunflower-land.com S3 bucket on every push to portal/corn-maze.
name: Corn Maze portal deploy

on:
  push:
    branches:
      - portal/corn-maze

jobs:
  deploy:
    concurrency: corn-maze-portal-deploy
    environment: corn-maze
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%dT%H:%M')" >> "$GITHUB_OUTPUT"

      - name: Get the current version ref
        id: get_version
        run: echo "VERSION=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: yarn install

      - name: Build
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          CI: false

          VITE_PORTAL_APP: "corn-maze"
          VITE_CLIENT_VERSION: ${{ steps.date.outputs.date }}
          VITE_RELEASE_VERSION: ${{ steps.get_version.outputs.VERSION }}
          VITE_PRIVATE_IMAGE_URL: "https://sunflower-land.com/game-assets"
          VITE_API_URL: "https://api-dev.sunflower-land.com"
          VITE_PORTAL_GAME_URL: "https://sunflower-land.com/testnet/"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PORTAL_DEPLOY_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.PORTAL_DEPLOY_SECRET }}
          aws-region: ap-southeast-2

      - name: Deploy static site to S3 subdomain
        run: aws s3 sync ./dist/ s3://corn-maze.minigames.sunflower-land.com --delete
